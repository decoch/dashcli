version: 2

project_name: dashcli

builds:
  - id: dash
    main: ./cmd/dash
    binary: dash
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    builds:
      - dash
    name_template: "{{ .ProjectName }}_{{ .Os | title }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

release:
  github:
    owner: decoch
    name: dashcli

